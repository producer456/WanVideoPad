name: WanVideoPad
options:
  bundleIdPrefix: com.wanvideopad
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  mlx-swift:
    url: https://github.com/ml-explore/mlx-swift
    from: "0.21.0"

targets:
  WanVideoPad:
    type: application
    platform: iOS
    sources:
      - WanVideoPad
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wanvideopad.app
        INFOPLIST_FILE: WanVideoPad/Info.plist
        TARGETED_DEVICE_FAMILY: "2"
        SWIFT_VERSION: "6.0"
        ARCHS: arm64
        SUPPORTS_MACCATALYST: false
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 9TUXM4MBAV
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: mlx-swift
        product: MLX
      - package: mlx-swift
        product: MLXNN
      - package: mlx-swift
        product: MLXFast
      - package: mlx-swift
        product: MLXRandom
